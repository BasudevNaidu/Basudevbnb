server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── React SPA routing ──────────────────────────────────────────────────────
    # Any URL that doesn't match a static file → serve index.html
    # This lets React Router handle /listings/:id, /login, etc.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy to backend container ────────────────────────────────────────
    # Requests to /api/... are forwarded to the backend service
    # "backend" is the service name defined in docker-compose.yml
    location /api/ {
        proxy_pass         http://backend:5001/api/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Cache static assets ───────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;
    gzip_min_length 256;
}
