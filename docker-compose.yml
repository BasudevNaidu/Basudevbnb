services:
  # ── Backend: Node.js + Express ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: basudevbnb-backend
    restart: unless-stopped
    ports:
      - "5001:5001"          # host:container — access API at localhost:5001
    environment:
      PORT: 5001
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI}         # Read from .env file at project root
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - basudevbnb-network

  # ── Frontend: React (Vite build) served by nginx ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: basudevbnb-frontend
    restart: unless-stopped
    ports:
      - "3000:80"            # host:container — access app at localhost:3000
    depends_on:
      - backend              # Wait for backend to start first
    networks:
      - basudevbnb-network

# ── Shared network so containers can talk to each other by service name ─────
networks:
  basudevbnb-network:
    driver: bridge
